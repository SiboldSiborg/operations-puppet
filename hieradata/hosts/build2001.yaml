# Needed to be able to build pybal
profile::base::remove_python2_on_bullseye: false

profile::docker::builder::prune_images: false
# Generate reports and rebuild images weekly on this host.
profile::docker::reporter::generate_reports: true
profile::docker::builder::rebuild_images: true
profile::docker::builder::build_base_images: true

profile::java::java_packages:
  - version: "8"
    variant: "jdk"
  - version: "11"
    variant: "jdk"
