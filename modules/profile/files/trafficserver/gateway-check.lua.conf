-- SPDX-License-Identifier: Apache-2.0
-- This stanza has 1 "default" section that lists rules applied anyway to all
-- wikis and the possibility for N stanzas that are meant to be wiki specific
-- rules. Keep the N small, we don't want this to blow up
-- For a specific wiki, rules are merged on 1-st level key basis, which
-- is as dumb as it gets. Since this is a lua table, order isn't guaranteed. So
-- if for any reason you end up wanting ordering, reconsider the approach
-- altogether
return {
    ["default"] = {
        ["/api/rest_v1/metrics/(.+)"] = {"rest-gateway.discovery.wmnet", 4113},
        ["/api/rest_v1/(.+)/pdf/(.*)"] = {"rest-gateway.discovery.wmnet", 4113},
        ["/api/rest_v1/feed/(.*)"] = {"rest-gateway.discovery.wmnet", 4113},
        ["/api/rest_v1/page/random/(.*)"] = {"rest-gateway.discovery.wmnet", 4113},
    },
--  T374683
    ["test.wikipedia.org"] = {
        ["/api/rest_v1/page/title/(.*)"] = {"rest-gateway.discovery.wmnet", 4113},
        ["/api/rest_v1/page/html/(.*)"] = {"rest-gateway.discovery.wmnet", 4113},
    },
}
