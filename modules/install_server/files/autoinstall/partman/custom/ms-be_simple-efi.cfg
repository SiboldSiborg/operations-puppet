# Automatic software RAID partitioning
# handled in autoinstall/scripts/partman_early_command.sh
#
# * Two disks, sdX & sdX (SSD), where X comes from above partman_early_command.sh
# * Primary partitions, no LVM, GPT
# * Layout:
#   - /boot/efi: fat32: 256MB (UEFI EFI System Partition or ESP)
#   - /: ext4, RAID1, 60GB
#   - swap: RAID1, 1GB
#   - part4: swift accounts, (no RAID) formatted as xfs, unmounted
#   - part5: swift container, (no RAID) formatted as xfs, unmounted
#
# Force GPT
d-i partman-basicfilesystems/choose_label   string  gpt
d-i partman-basicfilesystems/default_label  string  gpt
d-i partman-partitioning/choose_label       string  gpt
d-i partman-partitioning/default_label      string  gpt
d-i partman/choose_label                    string  gpt
d-i partman/default_label                   string  gpt
# means the xfs drives will need to be moved to an extended partition
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/device_remove_lvm   boolean true
# Define physical partitions
d-i partman-auto/method     string  raid
d-i partman-auto/expert_recipe  string          \
    multiraid ::                                \
            256 256 256 fat32                   \
                $primary{ }                     \
                method{ efi }                   \
                format{ }                       \
            .                                   \
            60000   8000    60000   raid        \
                $primary{ } method{ raid }      \
            .                                   \
            1000    1000    1000    linux-swap  \
                method{ swap }                  \
                format{ }                       \
            .                                   \
            200000  500 240000  xfs             \
                method{ format }                \
                format{ } use_filesystem{ }     \
                filesystem{ xfs }               \
            .                                   \
            30000   10000   -1  xfs             \
                method{ format }                \
                format{ } use_filesystem{ }     \
                filesystem{ xfs }               \
            .
d-i partman-md/confirm              boolean true
d-i partman-md/confirm_nooverwrite  boolean true
d-i partman/confirm_write_new_label boolean true
d-i partman/choose_partition        select  finish
d-i partman/confirm                 boolean true
d-i partman/confirm_nooverwrite     boolean true
d-i partman-basicfilesystems/no_mount_point boolean false
